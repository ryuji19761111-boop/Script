<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D鬼ごっこ - 効果音追加版</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: sans-serif;
            user-select: none;
        }
        #scoreBoard {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #00ff88;
            font-size: 20px;
            font-weight: bold;
            background: rgba(26, 26, 46, 0.8);
            border: 2px solid #00ff88;
            padding: 10px 20px;
            border-radius: 8px;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(0,255,136,0.5);
        }
        #gameOver {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff3366;
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            background: rgba(10, 10, 20, 0.95);
            border: 3px solid #ff3366;
            padding: 30px;
            border-radius: 15px;
            z-index: 100;
            box-shadow: 0 0 20px rgba(255,51,102,0.6);
        }
        #restartBtn {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 20px;
            background: #ff3366;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        #restartBtn:active {
            background: #cc1144;
        }
        #touchPad {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 130px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            touch-action: none;
            z-index: 50;
        }
        #joystick {
            position: absolute;
            top: 40px;
            left: 40px;
            width: 50px;
            height: 50px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff88;
        }
    </style>
</head>
<body>

    </div>
    <div id="touchPad"><div id="joystick"></div></div>

const gameoverSoundBase64 = "https://media.discordapp.net/attachments/1490374800420634718/1517686782957850784/VID_20260620_0850032352.mp4?ex=6a3929b6&is=6a37d836&hm=04bda770d2b7ef74adb4c76935241b5c3fe351597494884663514504b4e902d9&";
        // --- ゲーム管理用変数 ---
        let scene, camera, renderer;
        let charRoot, charBodyGroup, leftLeg, rightLeg, leftArm, rightArm;
        let enemy;
        let isGameOver = false;
        let startTime = Date.now();
        
        let moveX = 0, moveZ = 0;
        let currentVelocityX = 0, currentVelocityZ = 0;
        const fieldSize = 40;

        // オーディオ用変数
        let audioListener, gameOverSound;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.fog = new THREE.FogExp2(0x1a1a2e, 0.03);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // =====================
            // 🔊 オーディオのセットアップ
            // =====================
            audioListener = new THREE.AudioListener();
            camera.add(audioListener); // カメラにマイク（耳）を取り付ける

            gameOverSound = new THREE.Audio(audioListener);
            const audioLoader = new THREE.AudioLoader();
            audioLoader.load(gameoverSoundBase64, function(buffer) {
                gameOverSound.setBuffer(buffer);
                gameOverSound.setVolume(0.6); // 音量調整 (0.0 〜 1.0)
            });

            // ライト
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffe6a7, 1.2);
            dirLight.position.set(10, 20, 10);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            const pointLight = new THREE.PointLight(0x00ffff, 1.5, 15);
            pointLight.position.set(0, 5, 0);
            scene.add(pointLight);

            // 地面
            const gridHelper = new THREE.GridHelper(fieldSize * 2, 40, 0x444466, 0x222244);
            gridHelper.position.y = 0.01;
            scene.add(gridHelper);

            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(fieldSize * 2, fieldSize * 2),
                new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.8 })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // 外周の壁
            createWall(0, -fieldSize, fieldSize * 2, 4, 2);
            createWall(0, fieldSize, fieldSize * 2, 4, 2);
            createWall(-fieldSize, 0, 2, 4, fieldSize * 2);
            createWall(fieldSize, 0, 2, 4, fieldSize * 2);

            // 障害物
            createObstacle(-15, -15, 6, 4, 6, 0x3333ff);
            createObstacle(15, -15, 6, 4, 6, 0x3333ff);
            createObstacle(-15, 15, 6, 4, 6, 0x3333ff);
            createObstacle(15, 15, 6, 4, 6, 0x3333ff);
            createObstacle(0, -20, 20, 5, 2, 0x00ff88);
            createObstacle(0, 20, 20, 5, 2, 0x00ff88);
            createObstacle(-25, 0, 2, 5, 15, 0x9900ff);
            createObstacle(25, 0, 2, 5, 15, 0x9900ff);
            createObstacle(0, 0, 4, 8, 4, 0xffaa00);

            // 🤖 プレイヤー（R16関節ロボ）

            charBodyGroup = new THREE.Group();
            charRoot.add(charBodyGroup);

            const matBody = new THREE.MeshStandardMaterial({ color: 0x00ff88, roughness: 0.4 });
            const matJoint = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.6 });
            const matSkin = new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.5 });
            const matEye = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.2 });

            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.3, 0.6), matBody);
            body.position.y = 1.45; body.castShadow = true; charBodyGroup.add(body);

            const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.3), matJoint);
            neck.position.y = 2.2; charBodyGroup.add(neck);

            const headGroup = new THREE.Group();
            headGroup.name = "headGroup"; headGroup.position.y = 2.6;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), matSkin);
            head.castShadow = true; headGroup.add(head);

            const eyeGeo = new THREE.BoxGeometry(0.15, 0.15, 0.05);
            const leftEye = new THREE.Mesh(eyeGeo, matEye); leftEye.position.set(-0.2, 0.1, 0.4);
            const rightEye = leftEye.clone(); rightEye.position.x = 0.2;
            headGroup.add(leftEye, rightEye); charBodyGroup.add(headGroup);

            function makeLeg(x){
                const leg = new THREE.Group(); leg.position.set(x, 0.9, 0);
                const joint = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), matJoint); leg.add(joint);
                const upper = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.7, 0.35), new THREE.MeshStandardMaterial({ color: 0x3333ff }));
                upper.position.y = -0.35; upper.castShadow = true; leg.add(upper);
                const lowerGroup = new THREE.Group(); lowerGroup.position.y = -0.7;
                const lower = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.7, 0.3), new THREE.MeshStandardMaterial({ color: 0x2222aa }));
                lower.position.y = -0.35; lower.castShadow = true; lowerGroup.add(lower);
                const foot = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.2, 0.6), new THREE.MeshStandardMaterial({ color: 0x111188 }));
                foot.position.set(0, -0.7, 0.1); foot.castShadow = true; lowerGroup.add(foot);
                leg.add(lowerGroup); leg.userData = { lowerGroup: lowerGroup }; return leg;
            }
            leftLeg = makeLeg(-0.35); rightLeg = makeLeg(0.35); charBodyGroup.add(leftLeg, rightLeg);

            function makeArm(x, isLeft){
                const arm = new THREE.Group(); arm.position.set(x, 2.0, 0);
                const joint = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), matJoint); arm.add(joint);
                const upper = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.6, 0.25), matBody);
                upper.position.y = -0.3; upper.castShadow = true; arm.add(upper);
                const forearmGroup = new THREE.Group(); forearmGroup.position.y = -0.6;
                const forearm = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.6, 0.22), new THREE.MeshStandardMaterial({ color: 0x00aa88 }));
                forearm.position.y = -0.3; forearm.castShadow = true; forearmGroup.add(forearm);
                const hand = new THREE.Mesh(new THREE.SphereGeometry(0.15, 16, 16), matSkin);
                hand.position.y = -0.6; hand.castShadow = true; forearmGroup.add(hand);
                arm.add(forearmGroup); arm.userData = { forearmGroup: forearmGroup, isLeft: isLeft }; return arm;
            }
            leftArm = makeArm(-0.65, true); rightArm = makeArm(0.65, false); charBodyGroup.add(leftArm, rightArm);

            charRoot.position.set(0, 0, 30);
            scene.add(charRoot);

            // 👻 鬼
            const textureLoader = new THREE.TextureLoader();
            const enemyTexture = textureLoader.load(enemyBase64);
            const enemyGeo = new THREE.PlaneGeometry(3.5, 3.5);
            const enemyMat = new THREE.MeshBasicMaterial({ map: enemyTexture, transparent: true, side: THREE.DoubleSide });
            enemy = new THREE.Mesh(enemyGeo, enemyMat);
            enemy.position.set(0, 1.75, -30);
            scene.add(enemy);

            window.addEventListener('resize', onWindowResize);
            setupTouchControls();
            setupKeyControls();
        }

        function createWall(x, z, w, h, d) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.7 });
            const wall = new THREE.Mesh(geo, mat);
            wall.position.set(x, h/2, z);
            wall.receiveShadow = true; wall.castShadow = true;
            scene.add(wall);
            obstacles.push({ x: x, z: z, hx: w/2, hz: d/2 });
        }

        function createObstacle(x, z, w, h, d, glowColor) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ color: 0x11111a, emissive: glowColor, emissiveIntensity: 0.3, roughness: 0.2 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, h/2, z);
            mesh.castShadow = true; mesh.receiveShadow = true;
            scene.add(mesh);
            obstacles.push({ x: x, z: z, hx: w/2 + 0.6, hz: d/2 + 0.6 });
        }

        // 操作
        function setupKeyControls() {
            window.addEventListener('keydown', (e) => {
                if(isGameOver) return;
                if (e.key === 'ArrowUp' || e.key === 'w') moveZ = -1;
                if (e.key === 'ArrowDown' || e.key === 's') moveZ = 1;
                if (e.key === 'ArrowLeft' || e.key === 'a') moveX = -1;
                if (e.key === 'ArrowRight' || e.key === 'd') moveX = 1;
            });
            window.addEventListener('keyup', (e) => {
                if (['ArrowUp', 'w', 'ArrowDown', 's'].includes(e.key)) moveZ = 0;
                if (['ArrowLeft', 'a', 'ArrowRight', 'd'].includes(e.key)) moveX = 0;
            });
        }

        function setupTouchControls() {
            const pad = document.getElementById('touchPad');
            const stick = document.getElementById('joystick');
            const padRect = pad.getBoundingClientRect();
            const centerX = padRect.width / 2;
            const centerY = padRect.height / 2;

            function handleMove(touchX, touchY) {
                if(isGameOver) return;
                const deltaX = touchX - (padRect.left + centerX);
                const deltaY = touchY - (padRect.top + centerY);
                const distance = Math.min(Math.sqrt(deltaX*deltaX + deltaY*deltaY), 45);
                const angle = Math.atan2(deltaY, deltaX);

                stick.style.transform = `translate(${Math.cos(angle)*distance}px, ${Math.sin(angle)*distance}px)`;
                moveX = (Math.cos(angle) * (distance / 45));
                moveZ = (Math.sin(angle) * (distance / 45));
            }

            pad.addEventListener('touchstart', (e) => { handleMove(e.touches[0].clientX, e.touches[0].clientY); });
            pad.addEventListener('touchmove', (e) => { handleMove(e.touches[0].clientX, e.touches[0].clientY); });
            pad.addEventListener('touchend', () => {
                stick.style.transform = 'translate(0px, 0px)';
                moveX = 0; moveZ = 0;
            });
        }

        // メインループ
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.008;

            if (!isGameOver) {
                document.getElementById('time').innerText = Math.floor((Date.now() - startTime) / 1000);

                currentVelocityX += (moveX * 0.4 - currentVelocityX) * 0.2;
                currentVelocityZ += (moveZ * 0.4 - currentVelocityZ) * 0.2;

                const prevX = charRoot.position.x;
                const prevZ = charRoot.position.z;

                charRoot.position.x += currentVelocityX;
                charRoot.position.z += currentVelocityZ;

                // 衝突判定
                for (let obs of obstacles) {
                    if (Math.abs(charRoot.position.x - obs.x) < obs.hx && Math.abs(charRoot.position.z - obs.z) < obs.hz) {
                        charRoot.position.x = prevX;
                        charRoot.position.z = prevZ;
                        break;
                    }
                }

                const speed = Math.sqrt(currentVelocityX*currentVelocityX + currentVelocityZ*currentVelocityZ);
                if (speed > 0.05) {
                    const targetAngle = Math.atan2(-currentVelocityX, -currentVelocityZ);
                    let diffAngle = targetAngle - charRoot.rotation.y;
                    diffAngle = Math.atan2(Math.sin(diffAngle), Math.cos(diffAngle));
                    charRoot.rotation.y += diffAngle * 0.2;

                    leftLeg.rotation.x = Math.sin(time) * 0.7; rightLeg.rotation.x = -Math.sin(time) * 0.7;
                    leftLeg.userData.lowerGroup.rotation.x = Math.max(0, -Math.sin(time) * 0.5);
                    rightLeg.userData.lowerGroup.rotation.x = Math.max(0, Math.sin(time) * 0.5);
                    leftArm.rotation.x = -Math.sin(time) * 0.6; rightArm.rotation.x = Math.sin(time) * 0.6;
                    leftArm.rotation.z = (Math.sin(time * 2) * 0.05) - 0.1; rightArm.rotation.z = (-Math.sin(time * 2) * 0.05) + 0.1;
                    leftArm.userData.forearmGroup.rotation.x = -0.3 - Math.sin(time) * 0.2; rightArm.userData.forearmGroup.rotation.x = -0.3 + Math.sin(time) * 0.2;

                    charBodyGroup.position.y = Math.abs(Math.sin(time)) * 0.25;
                    const headGroup = charBodyGroup.getObjectByName("headGroup");
                    if(headGroup) {
                        headGroup.rotation.x = Math.sin(time * 2) * 0.06; headGroup.rotation.z = Math.sin(time) * 0.04;
                    }
                } else {
                    leftLeg.rotation.x *= 0.8; rightLeg.rotation.x *= 0.8;
                    leftLeg.userData.lowerGroup.rotation.x *= 0.8; rightLeg.userData.lowerGroup.rotation.x *= 0.8;
                    leftArm.rotation.x *= 0.8; rightArm.rotation.x *= 0.8;
                    charBodyGroup.position.y = Math.sin(time * 0.5) * 0.03;
                }

                // 鬼の追尾
                const elapsedTime = (Date.now() - startTime) / 1000;
                const enemySpeed = 0.16 + (elapsedTime * 0.004);

                const diffE_X = charRoot.position.x - enemy.position.x;
                const diffE_Z = charRoot.position.z - enemy.position.z;
                const angleE = Math.atan2(diffE_Z, diffE_X);
                
                enemy.position.x += Math.cos(angleE) * enemySpeed;
                enemy.position.z += Math.sin(angleE) * enemySpeed;
                enemy.lookAt(camera.position);

                // カメラ追従
                const targetCamX = charRoot.position.x;
                const targetCamZ = charRoot.position.z + 14;
                camera.position.x += (targetCamX - camera.position.x) * 0.08;
                camera.position.z += (targetCamZ - camera.position.z) * 0.08;
                camera.position.y = 9;
                camera.lookAt(charRoot.position.x, 1, charRoot.position.z);

                // 当たり判定 ＆ ゲームオーバー
                const distance = charRoot.position.distanceTo(enemy.position);
                if (distance < 1.8) {
                    isGameOver = true;
                    document.getElementById('gameOver').style.display = 'block';
                    
                    // 【追加】ゲームオーバーの瞬間、効果音を再生！
                    if (gameOverSound && gameOverSound.buffer) {
                        if (gameOverSound.isPlaying) gameOverSound.stop();
                        gameOverSound.play();
                    }
                }
            }

            renderer.render(scene, camera);
        }

        // リトライ処理
        window.resetGame = function() {
            // もしリトライ時にまだ音が鳴っていたら止める
            if (gameOverSound && gameOverSound.isPlaying) {
                gameOverSound.stop();
            }
            charRoot.position.set(0, 0, 30);
            charRoot.rotation.set(0, 0, 0);
            enemy.position.set(0, 1.75, -30);
            currentVelocityX = 0; currentVelocityZ = 0;
            moveX = 0; moveZ = 0;
            startTime = Date.now();
            isGameOver = false;
            document.getElementById('gameOver').style.display = 'none';
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
